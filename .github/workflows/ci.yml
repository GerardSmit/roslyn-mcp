name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

env:
  NETCOREDBG_VERSION: "3.1.3-1062"

jobs:
  build-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore RoslynMCP.sln

      - name: Build
        run: dotnet build RoslynMCP.sln --configuration Release --no-restore --nologo

      - name: Cache netcoredbg
        id: cache-netcoredbg
        uses: actions/cache@v4
        with:
          path: ${{ runner.os == 'Linux' && '/usr/local/netcoredbg' || 'C:\netcoredbg\netcoredbg' }}
          key: netcoredbg-${{ runner.os }}-${{ env.NETCOREDBG_VERSION }}

      - name: Install netcoredbg (Linux)
        if: runner.os == 'Linux' && steps.cache-netcoredbg.outputs.cache-hit != 'true'
        run: |
          curl -sSL "https://github.com/Samsung/netcoredbg/releases/download/${{ env.NETCOREDBG_VERSION }}/netcoredbg-linux-amd64.tar.gz" \
            -o /tmp/netcoredbg.tar.gz
          sudo mkdir -p /usr/local/netcoredbg
          sudo tar xzf /tmp/netcoredbg.tar.gz -C /usr/local

      - name: Install netcoredbg (Windows)
        if: runner.os == 'Windows' && steps.cache-netcoredbg.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/Samsung/netcoredbg/releases/download/${{ env.NETCOREDBG_VERSION }}/netcoredbg-win64.zip"
          $zipPath = "$env:TEMP\netcoredbg.zip"
          Invoke-WebRequest -Uri $url -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath "C:\netcoredbg" -Force

      - name: Add netcoredbg to PATH (Linux)
        if: runner.os == 'Linux'
        run: echo "/usr/local/netcoredbg" >> $GITHUB_PATH

      - name: Add netcoredbg to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "C:\netcoredbg\netcoredbg" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Test
        run: dotnet test RoslynMCP.sln --configuration Release --no-build --nologo -p:UseAppHost=false

  release:
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || github.event_name == 'workflow_dispatch'
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            bump="${{ github.event.inputs.bump }}"
            latest_tag=$(git tag -l 'v*' --sort=-v:refname | head -1 || true)

            if [[ -n "$latest_tag" ]]; then
              base="${latest_tag#v}"
            else
              base=$(grep -oPm1 '(?<=<VersionPrefix>)[^<]+' RoslynMCP/RoslynMCP.csproj)
            fi

            IFS='.' read -r major minor patch <<< "$base"
            case "$bump" in
              major) version="$((major + 1)).0.0" ;;
              minor) version="$major.$((minor + 1)).0" ;;
              patch) version="$major.$minor.$((patch + 1))" ;;
            esac
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "Releasing version $version"

      - name: Create tag (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Pack
        run: >
          dotnet restore RoslynMCP.sln &&
          dotnet build RoslynMCP.sln --configuration Release --no-restore --nologo &&
          dotnet pack RoslynMCP/RoslynMCP.csproj
          -c Release -o artifacts --no-build --nologo
          /p:ContinuousIntegrationBuild=true
          /p:Version=${{ steps.version.outputs.version }}
          /p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Publish to NuGet
        run: >
          dotnet nuget push "artifacts/RoslynSense.*.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --skip-duplicate

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          previous_tag=$(git tag -l 'v*' --sort=-v:refname | grep -v "^${{ steps.version.outputs.tag }}$" | head -1 || true)
          if [[ -n "$previous_tag" ]]; then
            log=$(git log --pretty=format:"- %s (%h)" "$previous_tag..${{ steps.version.outputs.tag }}" --no-merges)
          else
            log=$(git log --pretty=format:"- %s (%h)" --no-merges)
          fi

          echo "$log" > release_notes.md
          echo "" >> release_notes.md
          echo "**NuGet:** [RoslynSense ${{ steps.version.outputs.version }}](https://www.nuget.org/packages/RoslynSense/${{ steps.version.outputs.version }})" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: RoslynSense v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          files: artifacts/*.nupkg
          generate_release_notes: false
