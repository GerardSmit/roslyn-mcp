name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore RoslynMCP.sln

      - name: Build
        run: dotnet build RoslynMCP.sln --configuration Release --no-restore --nologo

      - name: Test
        run: dotnet test RoslynMCP.sln --configuration Release --no-build --nologo -p:UseAppHost=false
